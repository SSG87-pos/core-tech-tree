<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Core Tech Style Mockups</title>
<style>
:root{
  --bg:#f6f8fb; --surface:#fff; --surface2:#f9fbfd; --ink:#111827; --muted:#667085;
  --line:#dfe7f1; --line2:#edf2f7; --accent:#2563eb; --accent2:#0f766e; --core:#b75a15;
  --radius:10px; --shadow:0 18px 50px rgba(15,23,42,.08);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink)}
button,input{font:inherit}
.shell{max-width:1440px;margin:0 auto;padding:24px}
.intro{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:end;margin-bottom:18px}
.intro h1{margin:0;font-size:34px;line-height:1.1;letter-spacing:0;font-weight:820}
.intro p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.55;max-width:760px}
.source{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
.tabs{position:sticky;top:0;z-index:10;display:flex;gap:8px;padding:10px;margin:0 -8px 18px;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px)}
.tabs button{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:780;cursor:pointer}
.tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.mock{display:none;border:1px solid var(--line);border-radius:18px;background:var(--surface);box-shadow:var(--shadow);overflow:hidden}
.mock.active{display:block}
.mock-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:22px 24px;border-bottom:1px solid var(--line)}
.mock-title h2{margin:0;font-size:24px;line-height:1.15;font-weight:820;letter-spacing:0}
.mock-title p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.5;max-width:800px}
.rating{display:grid;gap:6px;min-width:220px;font-size:12px;color:var(--muted)}
.rating b{color:var(--ink)}
.screen{padding:18px 20px 22px;background:var(--screen-bg,var(--bg))}
.appbar{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;margin-bottom:14px}
.brand h3{margin:0;font-size:28px;line-height:1.05;font-weight:780;letter-spacing:0}
.brand span{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:700}
.actions{display:flex;gap:8px}
.btn{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:8px 11px;font-size:12px;font-weight:760;color:var(--ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kpi{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:12px 13px}
.kpi small{display:block;color:var(--muted);font-size:11px;font-weight:780}
.kpi b{display:block;margin-top:4px;font-size:24px;line-height:1;color:var(--ink)}
.layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px}
.panel{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.panel-head{min-height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;border-bottom:1px solid var(--line2);font-size:13px;font-weight:820}
.panel-head span{font-size:11px;color:var(--muted)}
.filters{display:grid;gap:12px;padding:12px}
.filter-block label{display:block;margin-bottom:7px;color:var(--muted);font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.06em}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--line);background:var(--chip-bg,var(--surface2));border-radius:999px;padding:6px 9px;font-size:11px;font-weight:760;color:var(--chip-ink,var(--ink));line-height:1}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search{height:34px;width:100%;border:1px solid var(--line);border-radius:8px;background:var(--surface2);padding:0 10px;color:var(--muted);font-size:12px;font-weight:650}
.main{display:grid;gap:12px}
.map{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.map-head{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--line2);font-size:14px;font-weight:850}
.tree{padding:12px;display:grid;gap:9px}
.l1{border:1px solid var(--line);border-radius:10px;background:var(--surface2);overflow:hidden}
.l1-head{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid var(--line2);font-weight:850}
.count{margin-left:auto;border:1px solid color-mix(in srgb,var(--core) 34%,#fff);background:#fff7ed;color:var(--core);border-radius:999px;padding:3px 8px;font-size:11px;font-weight:850}
.l2-row{display:grid;grid-template-columns:130px minmax(0,1fr);border-top:1px solid var(--line2)}
.l2-row:first-of-type{border-top:0}
.l2-name{padding:10px;border-right:1px solid var(--line2);font-size:13px;font-weight:820;color:var(--ink)}
.techs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;padding:8px}
.tech{border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:8px 9px;min-width:0}
.tech b{display:flex;align-items:center;gap:6px;font-size:12px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.star{color:var(--accent2);font-size:13px}
.tech-meta{display:flex;gap:4px;margin-top:6px;overflow:hidden}
.pill{border:1px solid var(--line);background:var(--pill-bg,var(--surface2));border-radius:999px;padding:3px 6px;font-size:9.5px;font-weight:720;color:var(--muted);white-space:nowrap}
.stats{display:grid;grid-template-columns:280px minmax(0,1fr);gap:12px}
.bars{display:grid;gap:8px;padding:12px}
.bar{display:grid;grid-template-columns:70px 1fr 28px;gap:8px;align-items:center;font-size:11px;font-weight:770}
.track{height:8px;border-radius:99px;background:var(--line2);overflow:hidden}
.fill{height:100%;border-radius:99px;background:var(--accent)}
.columns{display:flex;gap:9px;align-items:end;height:144px;padding:12px 12px 24px;border-bottom:1px solid var(--line2)}
.col{display:grid;grid-template-rows:1fr auto;gap:5px;align-items:end;width:42px;text-align:center;font-size:10px;font-weight:800;color:var(--muted)}
.col i{display:block;border-radius:7px 7px 2px 2px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
.org-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.org-list{display:grid;gap:6px;padding:10px}
.org-item{display:grid;grid-template-columns:1fr auto;gap:8px;border:1px solid var(--line2);border-radius:8px;padding:7px 8px;font-size:11px;font-weight:790;background:var(--surface2)}
.org-item span{color:var(--muted);font-weight:720}
.note{padding:10px 12px;color:var(--muted);font-size:11px;line-height:1.45;border-top:1px solid var(--line2)}

.cal{--bg:#f7f7f6;--surface:#ffffff;--surface2:#fafafa;--ink:#151515;--muted:#6f6f6f;--line:#dedede;--line2:#eeeeee;--accent:#111111;--accent2:#5b6b7a;--radius:8px;--shadow:0 8px 24px rgba(0,0,0,.05)}
.linear{--bg:#f5f6fa;--surface:#ffffff;--surface2:#fafbff;--ink:#16171d;--muted:#707386;--line:#e1e3ec;--line2:#f0f1f6;--accent:#5b5bd6;--accent2:#2f7d86;--radius:10px;--shadow:0 20px 58px rgba(40,42,70,.08)}
.carbon{--bg:#f4f7fb;--surface:#ffffff;--surface2:#f8fafc;--ink:#102033;--muted:#607083;--line:#d8e1ea;--line2:#edf2f7;--accent:#0f62fe;--accent2:#007d79;--radius:6px;--shadow:0 14px 42px rgba(15,98,254,.07)}
.airtable{--bg:#f7f9fc;--surface:#ffffff;--surface2:#fbfcff;--ink:#14213d;--muted:#64748b;--line:#dde6f2;--line2:#eef3f8;--accent:#2d7ff9;--accent2:#14a38b;--radius:12px;--shadow:0 18px 45px rgba(45,127,249,.08);--chip-bg:#f6f8ff}
.coinbase{--bg:#f5f8ff;--surface:#ffffff;--surface2:#f9fbff;--ink:#06152b;--muted:#5c6f88;--line:#d7e4f5;--line2:#edf4fc;--accent:#0052ff;--accent2:#00a3a5;--radius:10px;--shadow:0 20px 56px rgba(0,82,255,.08)}
.cal .brand h3,.cal .mock-title h2{font-weight:760}.cal .panel,.cal .kpi,.cal .tech,.cal .l1,.cal .org-item{box-shadow:none}
.linear .screen{background:linear-gradient(180deg,#f7f8fb,#f2f4f9)}.linear .panel,.linear .map,.linear .kpi{border-color:#e5e7f0}
.carbon .l1-head{border-left:3px solid var(--accent)}.carbon .btn,.carbon .chip,.carbon .panel,.carbon .kpi,.carbon .tech{border-radius:4px}
.airtable .chip:nth-child(3n+1){--chip-bg:#eef7ff;--chip-ink:#1d5fa7}.airtable .chip:nth-child(3n+2){--chip-bg:#f2fbf5;--chip-ink:#087443}.airtable .chip:nth-child(3n+3){--chip-bg:#fff7ed;--chip-ink:#9a4b10}
.coinbase .brand h3{color:#0b3b8f}.coinbase .btn.primary{box-shadow:0 8px 18px rgba(0,82,255,.16)}
@media(max-width:980px){.layout,.stats,.org-split{grid-template-columns:1fr}.techs{grid-template-columns:1fr}.intro{grid-template-columns:1fr}.source{text-align:left}}
</style>
</head>
<body>
<div class="shell">
  <div class="intro">
    <div>
      <h1>Core Technology 2026 스타일 목업 5안</h1>
      <p>현재 화면의 강한 선, 진한 톤, 두꺼운 버튼감을 덜어내는 방향으로 같은 정보 구조를 5가지 디자인 시스템 톤에 얹어 비교했습니다. 데이터 밀도는 유지하되 선과 면, 배지, 차트의 무게를 낮추는 데 초점을 뒀습니다.</p>
    </div>
    <div class="source">Reference: getdesign.md<br>추천 순위는 이 화면의 업무형 데이터 성격 기준</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <main id="mocks"></main>
</div>
<script>
const styles = [
  {
    id:"carbon", name:"1. Carbon Steel", badge:"가장 추천",
    title:"Carbon Steel",
    desc:"IBM Carbon식 구조감에 POSCO 기술맵의 산업적 신뢰감을 얹은 안입니다. 선은 얇게, 모서리는 낮게, 정보 위계는 가장 명확하게 유지합니다.",
    score:"추천도 5/5 · 실제 적용 1순위", cls:"carbon"
  },
  {
    id:"linear", name:"2. Linear Precision", badge:"가장 세련",
    title:"Linear Precision",
    desc:"Linear처럼 미세한 경계와 낮은 대비로 전체를 가볍게 보이게 하는 안입니다. 기술맵이 제품 툴처럼 정돈돼 보입니다.",
    score:"추천도 4.5/5 · 고급스러운 내부 툴", cls:"linear"
  },
  {
    id:"airtable", name:"3. Airtable Data Canvas", badge:"가장 친숙",
    title:"Airtable Data Canvas",
    desc:"Airtable의 구조화된 데이터 미감을 참고한 안입니다. 태그와 필터가 많아도 다루기 쉬워 보이고, 사용자 수정 흐름과 잘 맞습니다.",
    score:"추천도 4/5 · 관리/편집 친화", cls:"airtable"
  },
  {
    id:"coinbase", name:"4. Institutional Blue", badge:"가장 신뢰",
    title:"Institutional Blue",
    desc:"Coinbase류의 신뢰감 있는 청색 기반입니다. 현재의 파란 정체성을 유지하되 면과 선을 가볍게 만들어 덜 무겁게 보이게 합니다.",
    score:"추천도 3.8/5 · 현재 톤의 안전한 개선", cls:"coinbase"
  },
  {
    id:"cal", name:"5. Cal Neutral", badge:"가장 절제",
    title:"Cal Neutral",
    desc:"Cal.com식 흑백 중립 UI입니다. 가장 얇고 차분하지만 철강 기술맵의 브랜드감은 약해질 수 있어 보조 후보로 적합합니다.",
    score:"추천도 3.5/5 · 미니멀하지만 다소 건조", cls:"cal"
  }
];
const techRows = [
  ["냉연","1.5GPa급 냉연강","강도-연성 밸런스","자동차소재연구그룹","오지훈"],
  ["도금","Ni-X 열처리 생략 도금","Ni-X 조성 제어","도금연구그룹","정다은"],
  ["후판","LNG용 고Mn강","고Mn 합금설계","후판연구그룹","홍길동"],
  ["A1-Steel Brain","AI 합금-공정 추천","조성-공정-성능 추천","AI공정그룹","세아"]
];
function renderMock(s){
  return `<section class="mock ${s.cls}" id="${s.id}">
    <div class="mock-head">
      <div class="mock-title"><h2>${s.title}</h2><p>${s.desc}</p></div>
      <div class="rating"><b>${s.badge}</b><span>${s.score}</span><span>핵심: 얇은 경계, 낮은 채도, 데이터 우선</span></div>
    </div>
    <div class="screen">
      <div class="appbar">
        <div class="brand"><h3>Core Technology 2026</h3><span>기술 · 조직 · 성장단계 통합 맵</span></div>
        <div class="actions"><button class="btn">JSON</button><button class="btn">XLSX</button><button class="btn primary">22개 표시</button></div>
      </div>
      <div class="kpis">
        ${[["Level 1","4"],["Level 2","20"],["Core기술","22"],["담당자","29"]].map(x=>`<div class="kpi"><small>${x[0]}</small><b>${x[1]}</b></div>`).join("")}
      </div>
      <div class="layout">
        <aside class="panel">
          <div class="panel-head">필터 <span>중복 선택</span></div>
          <div class="filters">
            <div class="filter-block"><label>기술 / 조직</label><div class="chips"><span class="chip active">기술</span><span class="chip">조직</span></div></div>
            <div class="filter-block"><label>Level 1</label><div class="chips"><span class="chip active">전체</span><span class="chip">제품</span><span class="chip">공정</span><span class="chip">솔루션</span><span class="chip">AX</span></div></div>
            <div class="filter-block"><label>성장 단계</label><div class="chips"><span class="chip active">★ 기술성숙</span><span class="chip">★ 기술진화</span><span class="chip">★ 신시장/미래</span></div></div>
            <div class="filter-block"><label>검색</label><input class="search" value="기술명 · 태그 · 연구그룹 · 담당자" readonly /></div>
          </div>
        </aside>
        <section class="main">
          <div class="map">
            <div class="map-head">기술 체계 맵 <span class="count">제품 Core 8개</span></div>
            <div class="tree">
              <div class="l1">
                <div class="l1-head">제품 <span class="count">Core 8개</span></div>
                ${["냉연","도금"].map((l2,i)=>`<div class="l2-row">
                  <div class="l2-name">${l2}</div>
                  <div class="techs">
                    ${techRows.slice(i*2,i*2+2).map(r=>`<div class="tech"><b><span class="star">★</span>${r[1]}</b><div class="tech-meta"><span class="pill">${r[2]}</span><span class="pill">${r[3]}</span><span class="pill">${r[4]}</span></div></div>`).join("")}
                  </div>
                </div>`).join("")}
              </div>
              <div class="l1">
                <div class="l1-head">AX <span class="count">Core 3개</span></div>
                <div class="l2-row"><div class="l2-name">A1-Steel Brain</div><div class="techs">${techRows.slice(3).map(r=>`<div class="tech"><b><span class="star">★</span>${r[1]}</b><div class="tech-meta"><span class="pill">${r[2]}</span><span class="pill">${r[3]}</span><span class="pill">${r[4]}</span></div></div>`).join("")}</div></div>
              </div>
            </div>
          </div>
          <div class="stats">
            <div class="panel"><div class="panel-head">Level 1 분포 <span>작게</span></div><div class="bars">${[["제품",8,100],["공정",6,75],["솔루션",5,62],["AX",3,38]].map(x=>`<div class="bar"><b>${x[0]}</b><div class="track"><div class="fill" style="width:${x[2]}%"></div></div><span>${x[1]}</span></div>`).join("")}</div></div>
            <div class="panel"><div class="panel-head">Level 2 기술 분포 <span>아래축 · Level 1 묶음</span></div><div class="columns">${[1,1,1,1,2,1,1,1,1,1,2,1].map((v,i)=>`<div class="col"><i style="height:${28+v*34}px"></i><span>${["냉연","도금","선재","자동차","후판","STS","열연","제강","DX","건설","A1","A2"][i]}</span></div>`).join("")}</div></div>
          </div>
          <div class="org-split">
            <div class="panel"><div class="panel-head">연구그룹 <span>많은 기술순</span></div><div class="org-list">${["후판연구그룹","AI공정그룹","이용기술그룹"].map((x,i)=>`<div class="org-item"><b>${x}</b><span>Core ${3-i} · 담당자 ${2-i%2}명</span></div>`).join("")}</div></div>
            <div class="panel"><div class="panel-head">팀 <span>많은 기술순</span></div><div class="org-list">${["재료설계TF","데이터플랫폼팀","공정설비팀"].map((x,i)=>`<div class="org-item"><b>${x}</b><span>Core ${2-i%2} · 담당자 1명</span></div>`).join("")}</div></div>
          </div>
        </section>
      </div>
      <div class="note">적용 포인트: 현재의 굵은 테두리와 진한 버튼을 줄이고, 정보 레이어마다 밝기 차이를 둬서 지도와 통계가 같은 시스템으로 보이게 합니다.</div>
    </div>
  </section>`;
}
const tabs = document.querySelector("#tabs");
const mocks = document.querySelector("#mocks");
tabs.innerHTML = styles.map((s,i)=>`<button data-tab="${s.id}" class="${i===0?"active":""}">${s.name}</button>`).join("");
mocks.innerHTML = styles.map((s,i)=>renderMock(s).replace(`class="mock ${s.cls}"`,`class="mock ${s.cls} ${i===0?"active":""}"`)).join("");
tabs.addEventListener("click", e=>{
  const b=e.target.closest("[data-tab]");
  if(!b)return;
  document.querySelectorAll("[data-tab]").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".mock").forEach(x=>x.classList.toggle("active",x.id===b.dataset.tab));
});
</script>
</body>
</html>
