<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PTRS ↔ Core Tech</title>
<style>
  :root {
    --ink:#0b1628; --muted:#45556b; --line:#cbd8e8; --bg:#eef3f8; --panel:#fff;
    --navy:#001b44; --blue:#005bac; --blue-bg:#e6f1fb; --green:#008c95; --green-bg:#e3f6f7;
    --steel:#e7edf4; --steel-2:#f7fafc; --purple:#5265c9; --orange:#c57a12;
    --cat-market:#f59e0b; --cat-tech:#7c3aed; --cat-future:#e11d48;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    background:
      linear-gradient(90deg, rgba(0,91,172,.045) 1px, transparent 1px),
      linear-gradient(rgba(0,91,172,.035) 1px, transparent 1px),
      var(--bg);
    background-size: 28px 28px;
    color:var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app { min-height:100vh; padding:22px; display:grid; gap:14px; }
  .hero {
    border-radius:18px; padding:18px 22px; color:#fff;
    background:
      linear-gradient(135deg,#001b44,#004f9f 58%,#008c95),
      radial-gradient(circle at 82% 16%, rgba(255,255,255,.22), transparent 26%);
    display:block;
  }
  .hero h1 { margin:0; font-size:32px; letter-spacing:0; line-height:1.12; }
  .hero p { margin:0; max-width:980px; color:rgba(255,255,255,.78); line-height:1.58; font-size:14px; }
  .hero aside { color:rgba(255,255,255,.76); font-size:12px; font-weight:800; white-space:nowrap; }
  .kpis { display:grid; grid-template-columns:minmax(0, 1.35fr) minmax(0, 1fr); gap:12px; }
  .kpi-group {
    border:1px solid #cfdae8;
    border-radius:12px;
    background:#fff;
    overflow:hidden;
  }
  .kpi-group-title {
    min-height:36px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:8px 12px;
    border-bottom:1px solid #e3ebf4;
    color:#27384d;
    font-size:12px;
    font-weight:800;
  }
  .kpi-group-title:before {
    content:"";
    width:6px;
    height:18px;
    border-radius:999px;
    background:#7c8da3;
  }
  .kpi-group-title b {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:#27384d;
  }
  .kpi-group-title small {
    color:#667085;
    font-size:10px;
    font-weight:700;
  }
  .kpi-group.level .kpi-group-title:before { background:#64748b; }
  .kpi-group.core .kpi-group-title:before { background:linear-gradient(180deg,#005bac,#008c95); }
  .kpi-row { display:grid; gap:8px; padding:8px; }
  .kpi-group.level .kpi-row { grid-template-columns:repeat(4, minmax(0,1fr)); }
  .kpi-group.core .kpi-row { grid-template-columns:repeat(3, minmax(0,1fr)); }
  .kpi { background:#fff; border:1px solid #cfdae8; border-radius:10px; padding:12px 13px; box-shadow:0 10px 24px rgba(0,27,68,.06); }
  .kpi.level { background:#f8fafc; border-color:#d9e2ee; }
  .kpi.core-total { background:#f1f7fd; border-color:#bdd2ea; }
  .kpi.core-l3 { background:#f0f7ff; border-color:#bcd7f0; }
  .kpi.core-l4 { background:#eefafa; border-color:#bfe4e2; }
  .kpi.core-total b { color:#001b44; }
  .kpi.core-l3 b { color:#005bac; }
  .kpi.core-l4 b { color:#008c95; }
  .kpi span { display:block; color:var(--muted); font-size:10px; font-weight:900; }
  .kpi b { display:block; margin-top:4px; font-size:22px; color:#001b44; }
  .workspace { display:grid; grid-template-columns:250px minmax(0,1fr); gap:14px; }
  .panel { background:#fff; border:1px solid #cbd8e8; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,27,68,.07); }
  .panel-head { padding:13px 15px; border-bottom:1px solid #d9e3ef; display:flex; justify-content:space-between; align-items:center; gap:12px; background:linear-gradient(180deg,#fff,#f8fbfe); }
  .panel-head strong { font-size:15px; color:#001b44; }
  .panel-head small { color:var(--muted); font-size:11px; font-weight:800; text-align:right; }
  .filters { padding:13px; display:grid; gap:14px; }
  .filter-block h3 { margin:0 0 8px; color:#334155; font-size:11px; letter-spacing:.02em; }
  .btns { display:flex; flex-wrap:wrap; gap:6px; }
  .btns.tree-controls button {
    flex:1 1 calc(50% - 4px);
  }
  .btns.data-tools {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .btns.data-tools button {
    min-height:26px;
    padding:5px 7px;
    border-radius:8px;
    font-size:10px;
  }
  .data-note {
    margin-top:6px;
    color:#667085;
    font-size:10px;
    line-height:1.35;
  }
  .edit-panel {
    display:grid;
    gap:8px;
    padding:9px;
    border:1px solid #d9e3ef;
    border-radius:10px;
    background:#f8fafc;
  }
  .edit-panel.empty {
    color:#667085;
    font-size:11px;
    line-height:1.4;
  }
  .edit-path {
    padding:7px 8px;
    border-radius:8px;
    background:#fff;
    border:1px solid #e3ebf4;
    color:#334155;
    font-size:10px;
    line-height:1.35;
    word-break:keep-all;
  }
  .edit-field {
    display:grid;
    gap:4px;
  }
  .edit-field label {
    color:#45556b;
    font-size:10px;
    font-weight:800;
  }
  .edit-field input,
  .edit-field select,
  .edit-field textarea {
    width:100%;
    border:1px solid #dbe3ef;
    border-radius:8px;
    background:#fff;
    color:#27384d;
    font-size:11px;
    font-weight:650;
    outline:none;
  }
  .edit-field input,
  .edit-field select {
    height:28px;
    padding:0 8px;
  }
  .edit-field textarea {
    min-height:54px;
    padding:7px 8px;
    resize:vertical;
    line-height:1.35;
  }
  .edit-actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .edit-actions button {
    min-height:28px;
    border-radius:8px;
    font-size:10px;
  }
  .edit-actions .save {
    background:#001b44;
    border-color:#001b44;
    color:#fff;
  }
  .file-input {
    display:none;
  }
  button {
    appearance:none; border:1px solid #cbd8e8; background:#fff; color:#27384d;
    min-height:30px; padding:6px 9px; border-radius:999px; font-size:11px; font-weight:900;
    cursor:pointer;
  }
  button.active { background:#001b44; color:#fff; border-color:#001b44; }
  button.core3 { background:var(--blue-bg); color:#1e3a8a; border-color:#b9ceff; }
  button.core4 { background:var(--green-bg); color:#065f46; border-color:#a8e7d4; }
  button.active.core3 { background:var(--blue); color:#fff; }
  button.active.core4 { background:var(--green); color:#fff; }
  input {
    width:100%; height:36px; border:1px solid #dbe3ef; border-radius:10px; padding:0 10px;
    font-size:12px; color:#334155; outline:none; background:#f8fafc;
  }
  .legend { display:grid; gap:7px; font-size:11px; color:#475467; line-height:1.35; }
  .legend-row { display:grid; grid-template-columns:24px 1fr; gap:7px; align-items:center; }
  .swatch { width:14px; height:14px; border-radius:5px; margin-top:1px; }
  .swatch.l3 { background:var(--blue); } .swatch.l4 { background:var(--green); } .swatch.included { background:#e8eef5; border:2px solid #7fa5cc; } .swatch.non { background:#cbd5e1; }
  .map-toolbar { padding:11px 15px; background:#f7fafc; border-bottom:1px solid #d9e3ef; display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .status { color:#475467; font-size:12px; font-weight:800; }
  .view-switch { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .mind-grid {
    padding:14px; display:grid; gap:18px;
    background:
      linear-gradient(90deg, rgba(0,91,172,.06) 1px, transparent 1px),
      linear-gradient(rgba(0,91,172,.045) 1px, transparent 1px),
      #f9fbfe;
    background-size: 22px 22px;
  }
  .l1-section {
    position:relative; border:1px solid #b9cbdf; border-radius:14px; background:rgba(255,255,255,.72);
    padding:12px; overflow:hidden;
  }
  .l1-backbone {
    position:relative; min-height:54px; border-radius:12px; padding:11px 14px;
    display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center;
    color:#fff; overflow:hidden;
  }
  .node-head { display:flex; align-items:center; gap:8px; min-width:0; }
  .collapse-btn {
    width:24px; height:24px; border-radius:7px; border:1px solid #cbd8e8; background:#fff;
    color:#27384d; display:inline-flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; line-height:1; cursor:pointer; flex:0 0 auto;
    transition:transform .16s ease, background .16s ease, border-color .16s ease;
  }
  .collapse-btn:hover { background:#f2f6fb; border-color:#9fb6d0; }
  .collapsed > .l1-backbone .collapse-btn,
  .collapsed > .l2-head .collapse-btn,
  .collapsed > .l3-main .collapse-btn { transform:rotate(-90deg); }
  .l1-backbone:after {
    content:""; position:absolute; left:18px; right:18px; bottom:0; height:4px;
    background:rgba(255,255,255,.38); border-radius:999px;
  }
  .l1-backbone.산업군 { background:linear-gradient(135deg,#003f8f,#005bac); }
  .l1-backbone.제품군 { background:linear-gradient(135deg,#006f78,#008c95); }
  .l1-backbone.공정군 { background:linear-gradient(135deg,#394ba8,#5265c9); }
  .l1-title { display:flex; align-items:center; gap:8px; min-width:0; }
  .l1-label {
    display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:6px;
    background:#001b44; color:#fff; font-size:9px; font-weight:900; letter-spacing:.02em; flex:0 0 auto;
  }
  .l1-title b { display:block; font-size:20px; line-height:1.1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .l1-title span { display:block; margin-top:4px; color:rgba(255,255,255,.75); font-size:11px; font-weight:800; }
  .l1-metrics { display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; }
  .l1-metrics span {
    height:25px; display:inline-flex; align-items:center; padding:0 9px; border-radius:999px;
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:10px; font-weight:900;
  }
  .l2-grid {
    position:relative; display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:13px;
    margin-left:20px; padding:14px 0 0 0;
  }
  .l2-card {
    position:relative;
    border:1px solid #c7d6e7; border-radius:12px;
    background:linear-gradient(180deg,#fff 0%,#f8fbfe 100%);
    overflow:hidden; min-height:260px; display:grid; grid-template-rows:auto 1fr;
  }
  .l2-card:before {
    content:""; position:absolute; left:13px; top:42px; bottom:12px; width:3px; border-radius:999px;
    background:linear-gradient(180deg,#005bac,#008c95);
    opacity:.55;
  }
  .l2-card:after {
    content:""; position:absolute; left:14px; right:12px; top:42px; height:1px;
    background:linear-gradient(90deg,rgba(0,91,172,.38),transparent);
  }
  .l2-head { position:relative; z-index:1; padding:10px 14px; border-bottom:1px solid #dfe8f2; display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; background:linear-gradient(180deg,#fafdff,#f1f6fb); }
  .l2-name { display:flex; align-items:center; gap:8px; min-width:0; }
  .l2-label {
    display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:6px;
    background:#001b44; color:#fff; font-size:9px; font-weight:900; letter-spacing:.02em; flex:0 0 auto;
  }
  .l2-head b { display:block; color:#001b44; font-size:17px; line-height:1.18; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .l2-head span { display:block; color:var(--muted); font-size:11px; margin-top:4px; line-height:1.3; }
  .root-pill { display:inline-flex; height:23px; align-items:center; padding:0 8px; border-radius:999px; color:#fff; font-size:9px; font-weight:900; white-space:nowrap; }
  .root-pill.산업군 { background:#005bac; } .root-pill.제품군 { background:#008c95; } .root-pill.공정군 { background:#5265c9; }
  .l2-head .root-pill {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:74px;
    height:30px;
    padding:0 12px;
    color:#fff;
    font-size:13px;
    font-weight:700;
    letter-spacing:0;
    box-shadow:none;
  }
  .l3-list { position:relative; z-index:1; padding:10px 10px 10px 24px; display:grid; gap:8px; align-content:start; }
  .l3-row {
    position:relative; border:1px solid #d8e3ef; border-radius:10px; overflow:hidden; background:#fff;
  }
  .l3-row:before {
    content:""; position:absolute; left:-11px; top:20px; width:11px; height:2px; background:#9eb6cf;
  }
  .l3-main {
    min-height:40px; padding:8px; display:grid; grid-template-columns:1fr; gap:8px; align-items:center;
  }
  .l3-main,
  .l4-item {
    cursor:pointer;
  }
  .l3-row.selected > .l3-main,
  .l4-item.selected {
    outline:2px solid #f59e0b;
    outline-offset:2px;
    background:#fffbeb;
  }
  .l3-row.core3 .l3-main { background:linear-gradient(90deg,#dcecff,#eef6ff); box-shadow:inset 5px 0 0 var(--blue); }
  .l3-title b { display:flex; align-items:center; gap:8px; font-size:12px; color:#0b1628; line-height:1.25; }
  .l3-row.core3 .l3-title b { color:#001b44; }
  .badge {
    display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:999px;
    color:#fff; font-size:9px; font-weight:900; white-space:nowrap;
  }
  .badge.l3 { background:var(--blue); } .badge.l4 { background:var(--green); } .badge.non { background:#d8e0ea; color:#475467; }
  .l4-list {
    position:relative; padding:10px 8px 10px 24px; display:grid; gap:6px;
    background:
      linear-gradient(90deg, rgba(0,91,172,.04) 1px, transparent 1px),
      #fff;
    background-size:16px 16px;
    border-top:1px solid #eef3f8;
  }
  .l1-section.collapsed .l2-grid,
  .l2-card.collapsed .l3-list,
  .l3-row.collapsed .l4-list { display:none; }
  .l2-card.collapsed { min-height:0; }
  .l4-list:before {
    content:""; position:absolute; left:13px; top:9px; bottom:11px; width:2px;
    background:linear-gradient(180deg,#8aa9c9,#008c95); border-radius:999px; opacity:.72;
  }
  .l4-item {
    position:relative; min-height:34px; display:grid; grid-template-columns:minmax(0,1fr) minmax(84px,auto); gap:7px; align-items:center;
    padding:5px 6px; border-radius:7px; border:1px solid #d8e3ef; background:#f8fafc;
    color:#475467; font-size:10px; font-weight:800;
  }
  .l4-item:before {
    content:""; position:absolute; left:-11px; top:50%; width:10px; height:2px; background:#9eb6cf;
  }
  .l4-item.core4 { background:var(--green-bg); border-color:#8edee1; color:#005d63; box-shadow:inset 3px 0 0 var(--green); }
  .l4-item.included { background:#f8fafc; border-color:#b8c9dc; color:#27384d; box-shadow:inset 3px 0 0 #7fa5cc; }
  .mark {
    width:22px; height:22px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center;
    background:#dbe3ef; color:#64748b; font-size:12px; font-weight:800; line-height:1; box-sizing:border-box;
  }
  .l4-item.core4 {
    grid-template-columns:24px minmax(0,1fr) minmax(84px,auto);
  }
  .mark.star { background:#fff7ed; color:#b45309; }
  .mark.star.market, .core-star.market { background:#fffbeb; color:#92400e; border:1.5px solid #f59e0b; }
  .mark.star.tech, .core-star.tech { background:#f5f3ff; color:#6d28d9; border:1.5px solid #8b5cf6; }
  .mark.star.future, .core-star.future { background:#fff1f2; color:#be123c; border:1.5px solid #f43f5e; }
  .mark.included { background:#edf3f8; color:#64748b; border:1px solid #cbd8e8; font-size:14px; }
  .core-star {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border-radius:8px;
    font-size:15px;
    font-weight:800;
    line-height:1;
    flex:0 0 auto;
    box-sizing:border-box;
  }
  .l4-copy { min-width:0; display:grid; gap:2px; }
  .l4-copy b { color:#0b1628; font-size:10px; line-height:1.22; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .l4-copy span { color:#475467; font-size:9px; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .l4-title-line {
    min-width:0;
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:5px;
    row-gap:4px;
  }
  .l4-title-line b {
    flex:0 1 auto;
    min-width:0;
    white-space:normal;
    overflow:visible;
    text-overflow:clip;
    line-height:1.3;
  }
  .rep-chip {
    flex:0 1 auto;
    max-width:118px;
    min-height:20px;
    display:inline-flex;
    align-items:center;
    padding:2px 6px;
    border-radius:999px;
    border:1px solid #d8e3ef;
    background:#f2f6fb;
    color:#52657a;
    font-size:10px;
    font-weight:650;
    line-height:1.1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .l4-item.core4 .rep-chip {
    background:#ecfbfa;
    border-color:#b9e5e2;
    color:#166a70;
  }
  .l4-item.included .rep-chip {
    background:#edf5ff;
    border-color:#c9dcef;
    color:#315a83;
  }
  .owners { display:grid; gap:2px; justify-items:end; }
  .owner {
    color:#1f344d; background:#edf3f8; border:1px solid #cbd8e8; border-radius:999px;
    padding:2px 6px; font-size:9px; font-weight:900; white-space:nowrap; max-width:118px; overflow:hidden; text-overflow:ellipsis;
  }
  .analytics-panel { display:grid; gap:14px; }
  .chart-grid { padding:16px; display:grid; grid-template-columns:1.05fr .95fr; gap:16px; background:#f6f8fb; }
  .chart-card {
    border:1px solid #d9e2ee; border-radius:10px; background:linear-gradient(180deg,#fff,#fbfcfe); overflow:hidden;
    box-shadow:0 1px 0 rgba(0,27,68,.04);
  }
  .chart-card.wide { grid-column:1 / -1; }
  .chart-title { padding:13px 15px; border-bottom:1px solid #e8eef6; display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .chart-title b { color:#071225; font-size:13px; display:flex; align-items:center; gap:8px; }
  .chart-title b:before { content:""; width:6px; height:18px; border-radius:999px; background:#94a3b8; }
  .chart-card.scope .chart-title b:before { background:#334155; }
  .chart-card.l1-core .chart-title b:before { background:linear-gradient(180deg,#005bac,#5265c9); }
  .chart-card.category .chart-title b:before { background:linear-gradient(180deg,var(--cat-market),var(--cat-future)); }
  .chart-card.matrix .chart-title b:before { background:#64748b; }
  .chart-card.groups .chart-title b:before { background:#0f766e; }
  .chart-card.programs .chart-title b:before { background:#475569; }
  .chart-title span { color:#667085; font-size:10px; font-weight:700; }
  .bar-chart { padding:14px 15px; display:grid; gap:10px; }
  .bar-row { display:grid; grid-template-columns:112px minmax(0,1fr) 32px; gap:10px; align-items:center; font-size:11px; font-weight:700; color:#27384d; }
  .bar-row[data-chart-filter] { cursor:pointer; }
  .bar-row[data-chart-filter]:hover span { color:#071225; }
  .bar-track { height:9px; border-radius:999px; background:#eef2f7; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(15,23,42,.035); }
  .bar-fill { display:block; height:100%; border-radius:999px; background:#475569; }
  .dual-bars { padding:14px 15px; display:grid; gap:11px; }
  .dual-legend { display:flex; justify-content:flex-end; gap:12px; color:#667085; font-size:10px; font-weight:700; }
  .dual-legend i { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
  .dual-legend .total i { background:#cbd5e1; }
  .dual-legend .core i { background:#0f766e; }
  .dual-row {
    display:grid; grid-template-columns:112px minmax(0,1fr) 68px; gap:10px; align-items:center;
    color:#27384d; font-size:11px; font-weight:700;
  }

function normalizeRows(payload){
  const source = Array.isArray(payload) ? payload : (payload.rows || []);
  return source.map((r) => {
    const owners = Array.isArray(r.owners) && r.owners.length
      ? r.owners
      : [{ group: r.group || "", team: r.team || "" }];
    return {
      l1: r.l1 || "",
      l2: r.l2 || "",
      l3: r.l3 || "",
      l4: r.l4 || "",
      coreLevel: Number(r.coreLevel || 0),
      category: r.category || "",
      group: r.group || owners[0]?.group || "",
      team: r.team || owners[0]?.team || "",
      program: r.research_stage || r.program || "-",
      rep: r.rep || "",
      owners,
    };
  }).filter(r => r.l1 && r.l2 && r.l3 && r.l4);
}

function clean(value){
  return value == null ? "" : String(value).trim();
}
function firstValue(row, names){
  for (const name of names) {
    const value = clean(row[name]);
    if (value) return value;
  }
  return "";
}
function splitOwners(text){
  return clean(text).split(/[;,]/).map(v => v.trim()).filter(Boolean);
}
function resetFiltersAfterDataLoad(){
  Object.assign(state, { core:"all", level1:"all", category:"all", group:"all", search:"" });
  clearCollapsed();
  collapsePreset = "open";
  setCollapsePresetActive("open");
  $("search").value = "";
  document.querySelectorAll("button[data-filter]").forEach(b => b.classList.toggle("active", b.dataset.value === "all"));
}
function rowsForExport(){
  return rows.map(({ program, ...rest }) => ({
    ...rest,
    research_stage: program || "-",
  }));
}
function saveRowsToStorage(label){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      schemaVersion: 1,
      source: label || "browser import",
      updatedAt: new Date().toISOString(),
      rows: rowsForExport(),
    }));
  } catch (error) {
    console.warn("Unable to persist imported data", error);
  }
}
function applyDataPayload(payload, label, persist = true){
  const nextRows = normalizeRows(payload);
  if (!nextRows.length) throw new Error("가져온 파일에서 표시 가능한 기술 행을 찾지 못했습니다.");
  rows = nextRows;
  if (persist) saveRowsToStorage(label);
  resetFiltersAfterDataLoad();
  render();
  $("dataNote").textContent = `${label} 반영 완료 · ${rows.length}개 기술`;
}
function downloadBlob(filename, blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function exportJson(){
  const payload = {
    schemaVersion: 1,
    source: "PTRS Core Tech browser export",
    updatedAt: new Date().toISOString(),
    rows: rowsForExport(),
  };
  downloadBlob("ptrs-core-tech-data.json", new Blob([JSON.stringify(payload, null, 2)], { type:"application/json;charset=utf-8" }));
}
async function importJsonFile(file){
  const payload = JSON.parse(await file.text());
  applyDataPayload(payload, file.name);
}
function columnName(index){
  let name = "";
  let n = index + 1;
  while (n > 0) {
    const r = (n - 1) % 26;
    name = String.fromCharCode(65 + r) + name;
    n = Math.floor((n - 1) / 26);
  }
  return name;
}
function columnIndex(cellRef){
  const letters = String(cellRef || "").match(/[A-Z]+/i)?.[0] || "A";
  return letters.toUpperCase().split("").reduce((n, ch) => n * 26 + ch.charCodeAt(0) - 64, 0) - 1;
}
function xmlEscape(value){
  return clean(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function normalizeZipPath(path){
  const parts = [];
  for (const part of path.split("/")) {
    if (!part || part === ".") continue;
    if (part === "..") parts.pop();
    else parts.push(part);
  }
  return parts.join("/");
}
function resolveZipTarget(baseDir, target){
  const cleanTarget = String(target || "");
  if (cleanTarget.startsWith("/")) return normalizeZipPath(cleanTarget.slice(1));
  return normalizeZipPath(`${baseDir}/${cleanTarget}`);
}
async function inflateZipBytes(bytes){
  for (const format of ["deflate-raw", "deflate"]) {
    try {
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream(format));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    } catch (error) {
      if (format === "deflate") throw error;
    }
  }
  return bytes;
}
async function unzipXlsx(buffer){
  const bytes = new Uint8Array(buffer);
  const view = new DataView(buffer);
  let eocd = -1;
  for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i--) {
    if (view.getUint32(i, true) === 0x06054b50) {
      eocd = i;
      break;
    }
  }
  if (eocd < 0) throw new Error("XLSX ZIP 구조를 찾지 못했습니다.");
  const count = view.getUint16(eocd + 10, true);
  let offset = view.getUint32(eocd + 16, true);
  const entries = {};
  for (let i = 0; i < count; i++) {
    if (view.getUint32(offset, true) !== 0x02014b50) break;
    const method = view.getUint16(offset + 10, true);
    const compressedSize = view.getUint32(offset + 20, true);
    const nameLen = view.getUint16(offset + 28, true);
    const extraLen = view.getUint16(offset + 30, true);
    const commentLen = view.getUint16(offset + 32, true);
    const localOffset = view.getUint32(offset + 42, true);
    const name = new TextDecoder().decode(bytes.slice(offset + 46, offset + 46 + nameLen));
    const localNameLen = view.getUint16(localOffset + 26, true);
    const localExtraLen = view.getUint16(localOffset + 28, true);
    const dataStart = localOffset + 30 + localNameLen + localExtraLen;
    const raw = bytes.slice(dataStart, dataStart + compressedSize);
    entries[name] = method === 0 ? raw : await inflateZipBytes(raw);
    offset += 46 + nameLen + extraLen + commentLen;
  }
  return entries;
}
function parseXml(bytes){
  return new DOMParser().parseFromString(new TextDecoder().decode(bytes), "application/xml");
}
function elementsByLocalName(node, localName){
  return Array.from(node.getElementsByTagName("*")).filter(el => el.localName === localName);
}
function textFromCell(cell, sharedStrings){
  const type = cell.getAttribute("t");
  if (type === "s") {
    const idx = Number(elementsByLocalName(cell, "v")[0]?.textContent || 0);
    return sharedStrings[idx] || "";
  }
  if (type === "inlineStr") return elementsByLocalName(cell, "is")[0]?.textContent || "";

function crc32(bytes){
  let crc = -1;

  }

}
function writeU16(bytes, offset, value){
  bytes[offset] = value & 255;
  bytes[offset + 1] = (value >>> 8) & 255;
}
function writeU32(bytes, offset, value){
  bytes[offset] = value & 255;
  bytes[offset + 1] = (value >>> 8) & 255;
  bytes[offset + 2] = (value >>> 16) & 255;
  bytes[offset + 3] = (value >>> 24) & 255;
}
function createZip(entries){
  const encoder = new TextEncoder();
  const localParts = [];
  const centralParts = [];
  let offset = 0;
  entries.forEach(entry => {
    const nameBytes = encoder.encode(entry.name);
    const data = encoder.encode(entry.content);
    const crc = crc32(data);
    const local = new Uint8Array(30 + nameBytes.length + data.length);
    writeU32(local, 0, 0x04034b50);
    writeU16(local, 4, 20);
    writeU16(local, 8, 0);
    writeU32(local, 14, crc);
    writeU32(local, 18, data.length);
    writeU32(local, 22, data.length);
    writeU16(local, 26, nameBytes.length);
    local.set(nameBytes, 30);
    local.set(data, 30 + nameBytes.length);
    localParts.push(local);
    const central = new Uint8Array(46 + nameBytes.length);
    writeU32(central, 0, 0x02014b50);
    writeU16(central, 4, 20);
    writeU16(central, 6, 20);
    writeU16(central, 10, 0);
    writeU32(central, 16, crc);
    writeU32(central, 20, data.length);
    writeU32(central, 24, data.length);
    writeU16(central, 28, nameBytes.length);
    writeU32(central, 42, offset);
    central.set(nameBytes, 46);
    centralParts.push(central);
    offset += local.length;
  });
  const centralOffset = offset;
  const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
  const eocd = new Uint8Array(22);
  writeU32(eocd, 0, 0x06054b50);
  writeU16(eocd, 8, entries.length);
  writeU16(eocd, 10, entries.length);
  writeU32(eocd, 12, centralSize);
  writeU32(eocd, 16, centralOffset);
  return new Blob([...localParts, ...centralParts, eocd], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
}

function saveCurrentEdit(){

    const scope = $("editCoreScope").value;
    const category = $("editCategory").value;
    const program = $("editProgram").value || "-";
    l3Rows.forEach(r => {

      if (r.coreLevel === 3 || (scope === "l3" && r.coreLevel === 4)) r.coreLevel = 0;

      l3Rows[0].category = category;
      l3Rows[0].program = program;
    }
    selectedNode.key = l3EditKey(l3Rows[0]);

    const r = findL4Row(selectedNode.key);
    if (!r) return;
    const oldL3Rows = rows.filter(row => row.l1 === r.l1 && row.l2 === r.l2 && row.l3 === r.l3);
    const scope = $("editCoreScope").value;
    r.l4 = clean($("editL4Name").value) || r.l4;
    r.category = $("editCategory").value;
    r.program = $("editProgram").value || "-";
    r.rep = clean($("editRep").value);
    const owners = parseOwnerEditText($("editOwners").value);
    if (owners.length) {
      r.owners = owners;
      r.group = owners[0].group;
      r.team = owners[0].team;
    }
    if (scope === "l4") {
      oldL3Rows.forEach(row => { if (row.coreLevel === 3) row.coreLevel = 0; });
      r.coreLevel = 4;
    } else if (r.coreLevel === 4 || r.coreLevel === 3) {
      r.coreLevel = 0;
    }
    selectedNode.key = l4EditKey(r);
  }

function countBy(items, keyFn){
  return items.reduce((acc, item) => {
    const key = keyFn(item);
    acc[key] = (acc[key] || 0) + 1;

  }, {});
}
function escapeAttr(text){

    .replace(/"/g, "&quot;")

}
function techLabel(r){

  if (r.coreLevel === 4) return `${r.l4} · Level 4 Core`;
  return r.l4;
}
function uniqueTechLabels(items){
  const map = new Map();
  items.forEach(r => {
    const key = r.coreLevel === 3 ? `L3|${r.l1}|${r.l2}|${r.l3}` : `L4|${r.l1}|${r.l2}|${r.l3}|${r.l4}`;
    if (!map.has(key)) map.set(key, techLabel(r));
  });
  return Array.from(map.values());
}
function tooltipText(title, labels){
  const list = (labels || []).filter(Boolean);
  if (!list.length) return `${title}\n해당 기술 없음`;
  const shown = list.slice(0, 9).map(label => `- ${label}`);
  if (list.length > 9) shown.push(`- 외 ${list.length - 9}개`);
  return `${title}\n${shown.join("\n")}`;
}
function tooltipAttr(title, labels){
  return `data-tooltip="${escapeAttr(tooltipText(title, labels))}"`;
}
function tooltipSections(title, sections){
  const lines = [title];
  sections.forEach(section => {
    const labels = (section.labels || []).filter(Boolean);
    lines.push(`${section.label} ${labels.length}개`);
    if (labels.length) {
      labels.slice(0, 6).forEach(label => lines.push(`- ${label}`));
      if (labels.length > 6) lines.push(`- 외 ${labels.length - 6}개`);
    } else {
      lines.push("- 해당 기술 없음");
    }
  });
  return `data-tooltip="${escapeAttr(lines.join("\n"))}"`;
}
function barRows(counts, color, filterName, tooltipMap = {}){

  return entries.map(([label,value]) => `
    <div class="bar-row" ${filterName ? `data-chart-filter="${filterName}" data-value="${label}"` : ""} ${tooltipAttr(label, tooltipMap[label] || [])}>

function dualRows(totalCounts, coreCounts, filterName, titleText, tooltipMap = {}){

    render();

    collapsePreset = "custom";
    setCollapsePresetActive("custom");
    render();

  }

  if (saveBtn) {

  const cancelBtn = e.target.closest("#cancelEdit");
  if (cancelBtn) {
    selectedNode = null;

  const editTarget = e.target.closest("[data-edit-type]");
  if (editTarget && !e.target.closest("button")) {

    render();

  }
  const btn = e.target.closest("button[data-filter]");
  const chartItem = e.target.closest("[data-chart-filter]");
  if (!btn && !chartItem) return;
  if (chartItem && !btn) {

    state[chartFilter] = value;
    document.querySelectorAll(`button[data-filter="${chartFilter}"]`).forEach(b => b.classList.toggle("active", b.dataset.value === value));
    render();

  }

function moveVizTooltip(e){
  const pad = 14;

  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + rect.width > window.innerWidth - 8) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - 8) y = e.clientY - rect.height - pad;
  vizTooltip.style.left = `${Math.max(8, x)}px`;
  vizTooltip.style.top = `${Math.max(8, y)}px`;
}

  vizTooltip.classList.add("visible");
  moveVizTooltip(e);
});

$("exportXlsx").addEventListener("click", exportXlsx);
$("jsonFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    await importJsonFile(file);
  } catch (error) {
    $("dataNote").textContent = `JSON 가져오기 실패: ${error.message}`;
  } finally {
    e.target.value = "";
  }
});
$("xlsxFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    $("dataNote").textContent = "XLSX 읽는 중...";
    await importXlsxFile(file);
  } catch (error) {
    console.error(error);
    $("dataNote").textContent = `XLSX 가져오기 실패: ${error.message}`;
  } finally {
    e.target.value = "";
  }
});
$("reset").addEventListener("click", () => {
  Object.assign(state, { core:"all", level1:"all", category:"all", group:"all", search:"" });
  clearCollapsed();
  collapsePreset = "open";
  setCollapsePresetActive("open");
  $("search").value = "";
  document.querySelectorAll("button[data-filter]").forEach(b => b.classList.toggle("active", b.dataset.value === "all"));
  render();
});
loadRows();
</script>
</body>
</html>
